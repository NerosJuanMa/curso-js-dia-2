<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica D - JS ES Modules</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="cabecera">
    <h1>Generador de Frases Célebres</h1>
    <p>Práctica de JavaScript Avanzado usando ES Modules</p>
  </header>

  <main>
    <section class="contenedor-frase">
      <article class="tarjeta-frase">
        <blockquote id="texto-frase">
          "Haz clic en el botón inferior para cargar una frase inspiradora."
        </blockquote>
        <!-- El id="frase" coincide exactamente con tu document.querySelector("#frase") -->
      <p id="frase">Cargando frase...</p>
        <!-- <cite id="autor-frase">— El Mercado de la Memoria</cite> -->
      </article>
<!-- El id="boton-frase" coincide con tu document.querySelector("#boton-frase") -->
      <button id="boton-frase">Generar nueva frase</button>
      <!-- <button id="btn-cambiar" class="btn-accion">Siguiente frase</button> -->
    </section>
  </main>

  <footer>
    <p>Práctica D - Módulos de JavaScript nativos en el navegador</p>
  </footer>

  <!-- ⚠️ IMPORTANTE: El atributo type="module" permite usar import/export en app.js -->
  <script type="module" src="app.js"></script>
</body>
</html>
